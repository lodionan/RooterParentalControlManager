name: Parental Control Pipeline

on:

  workflow_dispatch:
    inputs:
      action:
        description: 'Acción'
        required: true
        type: choice
        options:
          - list
          - add
          - remove

  issues:
    types: [opened, edited]

jobs:
  run-parental-control:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Determine action
        id: determine
        run: |
          if [ "${{ github.event_name }}" == "issues" ]; then
            ACTION="${{ github.event.issue.title }}"
          else
            ACTION="${{ github.event.inputs.action }}"
          fi
          ACTION=$(echo "$ACTION" | tr '[:upper:]' '[:lower:]')
          echo "action=$ACTION" >> $GITHUB_OUTPUT

      - name: Run parental control
        env:
          ROUTE_URL: ${{ secrets.ROUTE_URL }}
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          mvn test \
            -Drooter.url="$ROUTE_URL" \
            -Dadmin.user="$ADMIN_USER" \
            -Dadmin.password="$ADMIN_PASSWORD" \
            -Daction=${{ steps.determine.outputs.action }}

      - name: Comment on issue
        if: github.event_name == 'issues'
        continue-on-error: true
        run: |
          echo "✅ Parental Control Executed: ${{ steps.determine.outputs.action }}" >> comment.txt
          echo "See Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> comment.txt
          gh issue comment ${{ github.event.issue.number }} -F comment.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}